name: Auto-merge PRs

on:
  pull_request:
    types: [opened, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # The merge-queue ruleset enforces SQUASH. `gh pr merge --auto` with
      # no strategy flag stores `autoMergeRequest.mergeMethod = MERGE`
      # (the repo's UI default merge button), which the queue's pre-
      # admission check refuses for the mismatch — stranding the PR
      # until someone re-enables auto-merge with `--squash`. Passing
      # `--squash` produces a benign "merge strategy is set by the merge
      # queue" warning from gh while correctly aligning the auto-merge
      # request with the queue's enforced method.
      - name: Enable auto-merge
        run: gh pr merge "$PR_URL" --auto --squash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
