name: Auto-Fix Failing Tests

on:
  workflow_run:
    workflows: ["Test Suite"]
    types: [completed]

permissions:
  contents: write

jobs:
  auto-fix:
    name: Claude Auto-Fix
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_commit.author.name != 'Claude Code'
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout branch that failed
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Claude Code"
          git config user.email "claude@anthropic.com"

      - name: Clone fold_db dependency
        run: |
          git clone --depth 1 https://github.com/shiba4life/fold_db.git "$GITHUB_WORKSPACE/../fold_db"
          mkdir -p "$GITHUB_WORKSPACE/../fold_db/src/server/static-react/dist"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lambdas/schema_service/target/
          key: ${{ runner.os }}-autofix-${{ hashFiles('lambdas/schema_service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-autofix-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pre-build lambda
        run: cd lambdas/schema_service && cargo check 2>&1 | tail -5

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude to fix tests
        continue-on-error: true
        run: |
          claude -p "The CI test suite just failed on this branch. This repo has one Rust lambda:
          - lambdas/schema_service/

          The code is already compiled. Your job:
          1. Run 'cd lambdas/schema_service && cargo test 2>&1' to find failures
          2. Read the error output carefully and fix the source code
          3. Re-run ONLY the failing test to verify your fix (e.g. cargo test test_name)

          Rules:
          - Fix the source code, not the tests (unless the test itself is wrong)
          - Do NOT add fallbacks or silent error handling
          - Keep fixes minimal and focused
          - Do NOT run cargo check or full rebuilds - the code is already compiled" \
            --max-turns 30 \
            --allowedTools "Bash,Read,Edit,Glob,Grep"

      - name: Push fix if changes were made
        if: always()
        run: |
          git checkout -- .github/workflows/ 2>/dev/null || true
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to push"
          else
            git add -A
            git reset HEAD .github/workflows/ 2>/dev/null || true
            git diff --cached --quiet || git commit -m "fix: auto-fix CI test failures

            Co-Authored-By: Claude Code <claude@anthropic.com>"
            git push origin ${{ github.event.workflow_run.head_branch }}
          fi
