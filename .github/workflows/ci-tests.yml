name: Test Suite

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone fold_db dependency
        run: |
          # Cargo.toml references fold_db at ../../../fold_db (relative to lambdas/schema_service/)
          # In CI: workspace is /home/runner/work/schema-infra/schema-infra
          # So ../../../fold_db = /home/runner/work/schema-infra/fold_db
          git clone --depth 1 --branch feature/schema-service-module https://github.com/shiba4life/fold_db.git "$GITHUB_WORKSPACE/../fold_db"
          # Create empty dist dir for RustEmbed (schema_service doesn't need the frontend)
          mkdir -p "$GITHUB_WORKSPACE/../fold_db/src/server/static-react/dist"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lambdas/schema_service/target/
          key: ${{ runner.os }}-test-schema-service-${{ hashFiles('lambdas/schema_service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-schema-service-

      - name: Check schema_service
        run: |
          cd lambdas/schema_service
          cargo check --verbose

      - name: Test schema_service
        run: |
          cd lambdas/schema_service
          cargo test --verbose
