name: Deploy Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Build Lambda (Docker for ONNX Runtime compatibility)
  #
  # Clippy + unit tests for the Lambda handler run in the schema_service
  # submodule's own CI (EdgeVector/schema_service -> .github/workflows/
  # ci.yml) so we don't re-run them here. This job's only job is to
  # assemble the deployable Lambda zip + fastembed Layer asset.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # schema-infra is public but its `schema_service/` submodule is
          # private. The submodule checkout needs a token with access to
          # EdgeVector/schema_service. `GH_PAT` is the EdgeVector
          # org-level secret provisioned for private-submodule checkouts
          # across workflows (confirmed by operator 2026-04-23); the
          # previous `PRIVATE_DEPS_TOKEN` name (carried over from
          # schema_service's own CI) and the local-repo `GPAT` secret
          # are both unprovisioned here.
          token: ${{ secrets.GH_PAT }}

      - name: Clone fold_db dependency
        run: |
          git clone --depth 1 --branch mainline https://github.com/EdgeVector/fold_db.git "$GITHUB_WORKSPACE/../fold_db"
          mkdir -p "$GITHUB_WORKSPACE/../fold_db/src/server/static-react/dist"

      - uses: actions/cache@v4
        with:
          path: |
            .docker-cache/cargo/registry/
            .docker-cache/cargo/git/
            schema_service/target/
          key: ${{ runner.os }}-docker-build-${{ hashFiles('schema_service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-docker-build-

      - name: Build Lambda + fastembed Layer
        run: ./build.sh release

      - uses: actions/upload-artifact@v4
        with:
          name: lambda-schema-service
          path: schema_service/target/lambda/server_lambda-extracted/
          retention-days: 1

      # Model + tokenizer files ship as a separate Lambda Layer so the
      # function zip stays small. build.sh populates this directory.
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-fastembed-layer
          path: target/fastembed_layer/
          retention-days: 1

  # 2. Deploy to Dev
  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api_url: ${{ steps.cf-outputs.outputs.api_url }}
    env:
      AWS_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4
        with:
          # CDK's `DockerImageCode.fromImageAsset` points at
          # `schema_service/crates/worker/Dockerfile` (inside the
          # schema_service submodule), so the deploy job needs the
          # submodule initialized. GH_PAT is the org-provisioned PAT
          # with access to the private schema_service repo.
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-schema-service
          path: schema_service/target/lambda/server_lambda-extracted/

      - name: Download fastembed layer artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-fastembed-layer
          path: target/fastembed_layer/

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json
      - run: cd cdk && npm ci
      - run: cd cdk && npm run build

      - name: Deploy CDK Stack (dev)
        run: cd cdk && npx cdk deploy SchemaServiceStack-dev --context environment=dev --require-approval never
        env:
          AWS_DEFAULT_REGION: us-west-2
          CDK_DEFAULT_REGION: us-west-2

      - name: Get CloudFormation outputs
        id: cf-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name SchemaServiceStack-dev \
            --region us-west-2 \
            --query 'Stacks[0].Outputs[?OutputKey==`SchemaServiceApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "Dev API URL: $API_URL"

  # 3. Smoke Test Dev
  smoke-test-dev:
    needs: deploy-dev
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ needs.deploy-dev.outputs.api_url }}
    steps:
      # The schema service Lambda cold-starts in ~45-120s right after
      # a deploy: it loads all schemas from S3 and runs fastembed on
      # each `descriptive_name` to rebuild the descriptive-name index.
      # At ~200 schemas that's longer than the old 30s curl cap, so
      # (a) wait longer before probing and (b) pass `--max-time 180`
      # so the first probe can ride out the cold start. Warm invokes
      # finish in <200ms so once init is past we're back to normal.
      - name: Wait for Lambda cold start
        run: sleep 10

      - name: Smoke test - health endpoint
        run: |
          echo "Testing: GET $API_URL/health"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/health" --max-time 180)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: health endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke test - list schemas
        run: |
          echo "Testing: GET $API_URL/v1/schemas"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/v1/schemas" --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: schemas endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke test - list views
        run: |
          echo "Testing: GET $API_URL/v1/views"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/v1/views" --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: views endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      # `projects/transform-worker-split` Lane E post-deploy smoke:
      # end-to-end exercise of the async compile worker. Posts a
      # minimal Rust source, polls GET /v1/transform-jobs/{id} until
      # the worker commits, validates the final TransformRecord.
      # Until the schema-infra submodule pointer bumps past MDT-E
      # (commit 4622640), the deployed Lambda still serves the legacy
      # `wasm_bytes` API and this step will exit 1 with a crisp
      # "missing field wasm_bytes" message — that's the baseline
      # signal that the worker split hasn't deployed yet.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            test/e2e
          sparse-checkout-cone-mode: false
      - name: Smoke test - transform async compile flow
        env:
          API_URL: ${{ env.API_URL }}
          TIMEOUT_SECS: "180"
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          bash test/e2e/transform-async-flow.sh

      - name: Smoke tests passed
        run: echo "All dev smoke tests passed (health + schemas + views + transform async flow)"

  # 4. Deploy to Prod
  deploy-prod:
    needs: smoke-test-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
        with:
          # Same submodule requirement as deploy-dev — see that job's
          # inline comment. Prod CDK needs the worker Dockerfile path
          # to resolve.
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-schema-service
          path: schema_service/target/lambda/server_lambda-extracted/

      - name: Download fastembed layer artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-fastembed-layer
          path: target/fastembed_layer/

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json
      - run: cd cdk && npm ci
      - run: cd cdk && npm run build

      - name: Deploy CDK Stack (prod)
        run: cd cdk && npx cdk deploy SchemaServiceStack-prod --context environment=prod --require-approval never
        env:
          AWS_DEFAULT_REGION: us-east-1
          CDK_DEFAULT_REGION: us-east-1

      - name: Prod deployment summary
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name SchemaServiceStack-prod \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`SchemaServiceApiUrl`].OutputValue' \
            --output text)
          echo "Production deployment completed"
          echo "API: $API_URL"
          echo "Domain: schema.folddb.com"
