name: Deploy Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Test
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone fold_db dependency
        run: |
          git clone --depth 1 --branch mainline https://github.com/shiba4life/fold_db.git "$GITHUB_WORKSPACE/../fold_db"
          mkdir -p "$GITHUB_WORKSPACE/../fold_db/src/server/static-react/dist"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lambdas/schema_service/target/
          key: ${{ runner.os }}-test-schema-service-${{ hashFiles('lambdas/schema_service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-schema-service-

      - run: cd lambdas/schema_service && cargo check
      - run: cd lambdas/schema_service && cargo test

  # 2. Build Lambda (Docker for ONNX Runtime compatibility)
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone fold_db dependency
        run: |
          git clone --depth 1 --branch mainline https://github.com/shiba4life/fold_db.git "$GITHUB_WORKSPACE/../fold_db"
          mkdir -p "$GITHUB_WORKSPACE/../fold_db/src/server/static-react/dist"

      - uses: actions/cache@v4
        with:
          path: |
            lambdas/schema_service/.docker-cargo/registry/
            lambdas/schema_service/.docker-cargo/git/
          key: ${{ runner.os }}-docker-build-${{ hashFiles('lambdas/schema_service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-docker-build-

      - name: Build Lambda in Docker (AL2023)
        run: cd lambdas/schema_service && ./build.sh release

      - uses: actions/upload-artifact@v4
        with:
          name: lambda-schema-service
          path: lambdas/schema_service/target/lambda/schema_service-extracted/
          retention-days: 1

  # 3. Deploy to Dev
  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api_url: ${{ steps.cf-outputs.outputs.api_url }}
    env:
      AWS_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-schema-service
          path: lambdas/schema_service/target/lambda/schema_service-extracted/

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json
      - run: cd cdk && npm ci
      - run: cd cdk && npm run build

      - name: Deploy CDK Stack (dev)
        run: cd cdk && npx cdk deploy SchemaServiceStack-dev --context environment=dev --require-approval never
        env:
          AWS_DEFAULT_REGION: us-west-2
          CDK_DEFAULT_REGION: us-west-2

      - name: Get CloudFormation outputs
        id: cf-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name SchemaServiceStack-dev \
            --region us-west-2 \
            --query 'Stacks[0].Outputs[?OutputKey==`SchemaServiceApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "Dev API URL: $API_URL"

  # 4. Smoke Test Dev
  smoke-test-dev:
    needs: deploy-dev
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ needs.deploy-dev.outputs.api_url }}
    steps:
      - name: Wait for Lambda cold start
        run: sleep 5

      - name: Smoke test - health endpoint
        run: |
          echo "Testing: GET $API_URL/health"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/health" --max-time 30)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: health endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke test - list schemas
        run: |
          echo "Testing: GET $API_URL/api/schemas"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/api/schemas" --max-time 30)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: schemas endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke test - list views
        run: |
          echo "Testing: GET $API_URL/api/views"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/api/views" --max-time 30)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: views endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke tests passed
        run: echo "All dev smoke tests passed"

  # 5. Deploy to Prod
  deploy-prod:
    needs: smoke-test-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-schema-service
          path: lambdas/schema_service/target/lambda/schema_service-extracted/

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json
      - run: cd cdk && npm ci
      - run: cd cdk && npm run build

      - name: Deploy CDK Stack (prod)
        run: cd cdk && npx cdk deploy SchemaServiceStack-prod --context environment=prod --require-approval never
        env:
          AWS_DEFAULT_REGION: us-east-1
          CDK_DEFAULT_REGION: us-east-1

      - name: Prod deployment summary
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name SchemaServiceStack-prod \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`SchemaServiceApiUrl`].OutputValue' \
            --output text)
          echo "Production deployment completed"
          echo "API: $API_URL"
          echo "Domain: schema.folddb.com"
