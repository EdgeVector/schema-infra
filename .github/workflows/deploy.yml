name: Deploy Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deploys so two main pushes (e.g. an auto-bump landing while a
# manual dispatch is mid-flight) can't run overlapping prod deploys against
# the same CloudFormation stack. Don't cancel an in-flight deploy — a
# half-applied CDK change is worse than waiting.
concurrency:
  group: deploy-pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Build Lambda (Docker for ONNX Runtime compatibility)
  #
  # Clippy + unit tests for the Lambda handler run in the fold monorepo's
  # CI (EdgeVector/fold .github/workflows/ci.yml) so we don't re-run
  # them here. This job's only job is to assemble the deployable Lambda
  # zip + fastembed Layer asset.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          submodules: recursive
          # schema-infra is public but its `fold/` submodule (the
          # EdgeVector/fold monorepo) is private. `GH_PAT` is the
          # org-level secret with access to private EdgeVector repos.
          token: ${{ secrets.GH_PAT }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            .docker-cache/cargo/registry/
            .docker-cache/cargo/git/
            fold/target/
          key: ${{ runner.os }}-docker-build-${{ hashFiles('fold/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-docker-build-

      # Cache the fastembed model files (90 MB ONNX + 4 tokenizer files) so
      # build.sh's "=== Fastembed Layer ===" step finds them already present
      # and SKIPS the HuggingFace download. HF hard-rate-limits CI runners
      # (HTTP 429) — pulling on every deploy made the prod deploy flap (4
      # consecutive 429 failures, 2026-06-04). With this cache HF is contacted
      # only on a cold cache: first run, a deliberate model bump, or a ~7-day
      # eviction. The key is the pinned HF revision — keep it in sync with
      # `HF_REVISION` in build.sh (bump both together when changing the model).
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: target/fastembed_layer/
          key: fastembed-model-5f1b8cd78bc4fb444dd171e59b18f3a3af89a079

      # Build the PROD Lambda zip first — measured-NMI engine OFF
      # (ENABLE_TRANSFORM_WASM defaults to 0). The prod binary must NOT link
      # the live WASM execution engine; prod enablement is the separate human
      # gate `gate1-prod-cutover-transform-wasm`. GH_PAT propagates into the
      # AL2023 Docker container so cargo can fetch private cross-repo git deps
      # (e.g. exemem_common from EdgeVector/exemem-infra); without it the
      # container has no git config and cargo's git fetcher hits public
      # github.com anonymously and fails auth.
      - name: Build PROD Lambda (transform-wasm OFF) + fastembed Layer
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ENABLE_TRANSFORM_WASM: '0'
          # DEPLOY_ENV feeds the container build's dev-only + prod-asserted-off
          # gate. With ENABLE_TRANSFORM_WASM=0 the gate is inert, but set it
          # explicitly so prod can never resolve as "dev" and the asserted-off
          # invariant is exercised on the real prod build path.
          DEPLOY_ENV: prod
        run: ./build.sh release

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: lambda-schema-service-prod
          path: fold/target/lambda/server_lambda-extracted/
          retention-days: 1

      # Build the DEV Lambda zip — measured-NMI engine ON. Reuses the same
      # Docker layer + fold/target cargo cache, so only the feature-gated
      # crates recompile. Card schema-service-enable-measured-nmi-engine.
      - name: Build DEV Lambda (transform-wasm ON)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ENABLE_TRANSFORM_WASM: '1'
          # DEV is the ONLY environment allowed to build the transform-wasm
          # engine. The container gate refuses ENABLE_TRANSFORM_WASM=1 unless
          # DEPLOY_ENV=dev, so this MUST be set for the dev build to succeed.
          DEPLOY_ENV: dev
        run: ./build.sh release

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: lambda-schema-service-dev
          path: fold/target/lambda/server_lambda-extracted/
          retention-days: 1

      # Model + tokenizer files ship as a separate Lambda Layer so the
      # function zip stays small. Feature-independent — one artifact for both
      # environments. build.sh populates this directory (idempotent across the
      # two builds above).
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: lambda-fastembed-layer
          path: target/fastembed_layer/
          retention-days: 1

  # 2. Deploy to Dev
  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC token issuance for aws-actions/configure-aws-credentials.
      # Scoped to this job so neither `build` nor `smoke-test-dev` can mint
      # AWS tokens. The role itself (SchemaInfraDeployDev) only trusts
      # `sub: repo:EdgeVector/schema-infra:*` from the OIDC provider.
      id-token: write
    outputs:
      api_url: ${{ steps.cf-outputs.outputs.api_url }}
    env:
      AWS_REGION: us-west-2
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # CDK's `DockerImageCode.fromImageAsset` points at
          # `fold/schema_service/crates/worker/Dockerfile` (inside the
          # fold monorepo submodule), so the deploy job needs the
          # submodule initialized. GH_PAT has access to the private
          # EdgeVector/fold repo.
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::152335099025:role/SchemaInfraDeployDev
          aws-region: us-west-2

      - name: Download Lambda artifact (dev — transform-wasm ON)
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: lambda-schema-service-dev
          path: fold/target/lambda/server_lambda-extracted/

      - name: Download fastembed layer artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: lambda-fastembed-layer
          path: target/fastembed_layer/

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json
      - run: cd cdk && npm ci
      - run: cd cdk && npm run build

      - name: Deploy CDK Stack (dev)
        run: cd cdk && npx cdk deploy SchemaServiceStack-dev --context environment=dev --require-approval never
        env:
          AWS_DEFAULT_REGION: us-west-2
          CDK_DEFAULT_REGION: us-west-2
          # Backend Sentry DSN baked into the Lambda + compile worker env at
          # synth time (schema-stack.ts reads process.env.OBS_SENTRY_DSN).
          # Empty secret → sink stays off. Write-only client token.
          OBS_SENTRY_DSN: ${{ secrets.OBS_SENTRY_DSN }}
          # GH_PAT propagates into the TransformCompileWorker Docker
          # build (via cdk schema-stack.ts buildArgs → Dockerfile ARG).
          # Required for cargo to fetch private cross-repo deps
          # (exemem_common). Companion to schema_service PR #114 which
          # adds the matching ARG GH_PAT + git config rewrite to the
          # Dockerfile.
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Get CloudFormation outputs
        id: cf-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name SchemaServiceStack-dev \
            --region us-west-2 \
            --query 'Stacks[0].Outputs[?OutputKey==`SchemaServiceApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "Dev API URL: $API_URL"

  # 3. Smoke Test Dev
  smoke-test-dev:
    needs: deploy-dev
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ needs.deploy-dev.outputs.api_url }}
    steps:
      # The schema service Lambda cold-starts in ~45-120s right after
      # a deploy: it loads all schemas from S3 and runs fastembed on
      # each `descriptive_name` to rebuild the descriptive-name index.
      # At ~200 schemas that's longer than the old 30s curl cap, so
      # (a) wait longer before probing and (b) pass `--max-time 180`
      # so the first probe can ride out the cold start. Warm invokes
      # finish in <200ms so once init is past we're back to normal.
      - name: Wait for Lambda cold start
        run: sleep 10

      - name: Smoke test - health endpoint
        run: |
          echo "Testing: GET $API_URL/health"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/health" --max-time 180)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: health endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke test - list schemas
        run: |
          echo "Testing: GET $API_URL/v1/schemas"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/v1/schemas" --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: schemas endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke test - list views
        run: |
          echo "Testing: GET $API_URL/v1/views"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/v1/views" --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: views endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      # NOTE: the async-compile transform smoke (POST rust_source →
      # poll GET /v1/transform-jobs/{id}) was removed when fold #978
      # ("transform submission is binary-only — drop server-side
      # compile") deleted that endpoint and the whole async-job model.
      # A proper binary-only replacement (POST a pre-compiled
      # `wasm_bytes` module and assert it registers) needs a committed,
      # known-good WASM fixture + the app-identity handshake, so it's
      # tracked separately rather than stubbed in here. Dev smoke now
      # covers the same surface as prod smoke (health + schemas +
      # views). See fkanban `schema-infra-binary-only-transform-smoke`.
      - name: Smoke tests passed
        run: echo "All dev smoke tests passed (health + schemas + views)"

  # 4. Deploy to Prod (main branch only).
  #
  # Without this `if:` gate, a `workflow_dispatch` triggered on a feature
  # branch will happily deploy that branch's artifacts to PROD — which is
  # exactly what happened when the migrate-to-fold-monorepo PR's
  # workflow_dispatch run shipped prod ahead of the post-merge push:main
  # run. Lucky alignment that time (same artifacts), but a clear footgun.
  deploy-prod:
    needs: smoke-test-dev
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC token issuance — SchemaInfraDeployProd only trusts
      # `sub: repo:EdgeVector/schema-infra:ref:refs/heads/main`, so a
      # workflow_dispatch on a feature branch can't assume this role even
      # if the `if:` gate above were removed.
      id-token: write
    outputs:
      api_url: ${{ steps.cf-outputs.outputs.api_url }}
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # Same submodule requirement as deploy-dev — see that job's
          # inline comment. Prod CDK needs the worker Dockerfile path
          # to resolve.
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::152335099025:role/SchemaInfraDeployProd
          aws-region: us-east-1

      - name: Download Lambda artifact (prod — transform-wasm OFF)
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: lambda-schema-service-prod
          path: fold/target/lambda/server_lambda-extracted/

      - name: Download fastembed layer artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: lambda-fastembed-layer
          path: target/fastembed_layer/

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json
      - run: cd cdk && npm ci
      - run: cd cdk && npm run build

      - name: Deploy CDK Stack (prod)
        run: cd cdk && npx cdk deploy SchemaServiceStack-prod --context environment=prod --require-approval never
        env:
          AWS_DEFAULT_REGION: us-east-1
          CDK_DEFAULT_REGION: us-east-1
          # Backend Sentry DSN baked into the Lambda + compile worker env at
          # synth time (schema-stack.ts reads process.env.OBS_SENTRY_DSN).
          # Empty secret → sink stays off. Write-only client token.
          OBS_SENTRY_DSN: ${{ secrets.OBS_SENTRY_DSN }}
          # See deploy-dev's GH_PAT comment — same rationale, prod side.
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Get CloudFormation outputs
        id: cf-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name SchemaServiceStack-prod \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`SchemaServiceApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "Production deployment completed"
          echo "API: $API_URL"
          echo "Domain: schema.folddb.com"

  # 5. Smoke Test Prod (main branch only).
  #
  # Read-only — health + list-schemas + list-views. Deliberately NO write
  # path so we don't pollute the prod registry with test records. (Dev
  # smoke covers the same read-only surface; a binary-only transform
  # write smoke is tracked separately — see the note in smoke-test-dev.)
  # The CDK deploy already shipped by the time this runs, so a failure does not
  # roll back — it marks the run red and pings Discord so a human can react.
  smoke-test-prod:
    needs: deploy-prod
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ needs.deploy-prod.outputs.api_url }}
    steps:
      # Same cold-start rationale as smoke-test-dev: the freshly-deployed
      # Lambda rebuilds the descriptive-name index from S3 on first invoke,
      # so wait a beat and give the first probe a generous --max-time.
      - name: Wait for Lambda cold start
        run: sleep 10

      - name: Smoke test - health endpoint
        run: |
          echo "Testing: GET $API_URL/health"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/health" --max-time 180)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: health endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke test - list schemas
        run: |
          echo "Testing: GET $API_URL/v1/schemas"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/v1/schemas" --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: schemas endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke test - list views
        run: |
          echo "Testing: GET $API_URL/v1/views"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL/v1/views" --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: views endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Prod smoke tests passed
        run: echo "All prod smoke tests passed (health + schemas + views)"

      # Prod is live on the new revision but failing — alert a human. Uses
      # the org-level DISCORD_WEBHOOK_URL (the same secret the discord-notify
      # stub inherits). Guarded so a missing secret no-ops instead of failing.
      - name: Alert Discord on prod smoke failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "No DISCORD_WEBHOOK_URL configured — skipping alert."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload=$(jq -nc \
            --arg title "🚨 schema_service PROD smoke FAILED" \
            --arg desc "Prod deployed on \`main\` but health/schemas/views smoke failed. Prod is live on the new revision — investigate now." \
            --arg url "$RUN_URL" \
            --arg repo "$GITHUB_REPOSITORY" \
            '{embeds:[{title:$title, description:$desc, url:$url, color:15158332, footer:{text:$repo}}]}')
          curl -fsS -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK"

  # 6. Notify on ANY deploy-pipeline failure.
  #
  # The per-job `smoke-test-prod` alert above only fires once prod is live —
  # it can't catch a `build` failure (the run that sat silently red for ~2
  # weeks, 2026-05-30 → 2026-06-12, was a build break before any deploy step).
  # This job `needs:` every job and runs `if: failure()`, so a failure
  # ANYWHERE in the pipeline pages a human with the run URL. It does NOT run on
  # a green pipeline (no channel spam) and is skipped — not failed — when
  # deploy-prod/smoke-test-prod themselves skip on non-main refs.
  notify-failure:
    needs: [build, deploy-dev, smoke-test-dev, deploy-prod, smoke-test-prod]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Alert Discord on deploy-pipeline failure
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "No DISCORD_WEBHOOK_URL configured — skipping alert."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload=$(jq -nc \
            --arg title "🚨 schema-infra Deploy Pipeline FAILED" \
            --arg desc "A job in the schema-infra deploy pipeline on \`${GITHUB_REF_NAME}\` failed. prod schema_service may be frozen on the last green revision — investigate now." \
            --arg url "$RUN_URL" \
            --arg repo "$GITHUB_REPOSITORY" \
            '{embeds:[{title:$title, description:$desc, url:$url, color:15158332, footer:{text:$repo}}]}')
          curl -fsS -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK"
